<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>母亲节快乐 专属祝福</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body {
            background: #fff0f6;
            font-family: "微软雅黑";
            overflow: hidden;
        }
        .box {
            text-align: center;
            padding-top: 120px;
            z-index: 99;
            position: relative;
        }
        .heart-main {
            font-size: 80px;
            color: #ff4d6d;
            animation: beat 1s infinite ease-in-out;
            margin-bottom: 30px;
        }
        @keyframes beat {
            0%{transform: scale(1);}
            50%{transform: scale(1.3);}
            100%{transform: scale(1);}
        }
        .text {
            font-size: 22px;
            color: #b82e44;
            line-height: 2.2;
        }
        /* 飘落爱心 */
        .heart {
            position: absolute;
            color: #ff758f;
            font-size: 20px;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0%{top: -10%;opacity:1;}
            100%{top: 100%;opacity:0;}
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="heart-main">❤</div>
        <div class="text">
            To 最亲爱的妈妈<br>
            母亲节快乐👩❤️<br>
            希望你永远不要被母亲这个标签所累<br>
            你就应该开心的做自己<br>
            愿你被时光温柔眷顾<br>
            平安喜乐 岁岁年年
        </div>
    </div>

    <script>
        // 自动生成飘落爱心
        function createHeart(){
            const heart = document.createElement('div');
            heart.innerHTML = '❤';
            heart.className = 'heart';
            heart.style.left = Math.random()*100 + '%';
            heart.style.animationDuration = Math.random()*3+2+'s';
            document.body.appendChild(heart);
            setTimeout(()=>{heart.remove()},5000)
        }
        setInterval(createHeart,300);
    </script>
</body>
</html>
